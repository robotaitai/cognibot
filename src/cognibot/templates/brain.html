<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>cognibot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root{
      --bg:#090b0f;--sf:#10141b;--card:#161c26;
      --b:#1c2430;--bh:#2c3848;
      --m:#627890;--t:#cddaea;--w:#f0f6fb;
      --a:#50d8cc;--a2:#7ba4f7;
      --pub:#50d8cc;--sub:#f0a050;--srv:#b880f0;
      --green:#4ade80;--red:#f87171;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.5}

    header{padding:12px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:14px;background:var(--sf)}
    header h1{font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--a)}
    .meta{color:var(--m);font-size:11px;flex:1}
    .btn{background:var(--card);border:1px solid var(--b);color:var(--t);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500}
    .btn:hover{border-color:var(--a)}

    .wrap{display:flex;min-height:calc(100vh - 46px)}
    nav{width:170px;border-right:1px solid var(--b);padding:10px 6px;background:var(--sf);flex-shrink:0}
    .ni{display:block;padding:7px 10px;border-radius:6px;color:var(--m);text-decoration:none;font-size:12px;font-weight:500;margin-bottom:1px;cursor:pointer}
    .ni:hover{color:var(--t);background:var(--card)}
    .ni.on{color:var(--w);background:var(--card);border:1px solid var(--bh)}

    main{flex:1;padding:18px 22px;overflow-x:hidden;min-width:0}
    section{display:none}section.on{display:block}
    h2{font-size:14px;font-weight:600;color:var(--w);margin-bottom:14px}

    .sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px}
    .sc{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:12px}
    .sc .l{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    .sc .v{font-size:22px;font-weight:700;color:var(--w);margin-top:2px}
    .sc .u{font-size:10px;color:var(--m);margin-top:1px}

    /* Mermaid */
    #mermaid-box{background:var(--sf);border:1px solid var(--b);border-radius:10px;padding:20px;overflow:auto;min-height:300px}
    #mermaid-box svg{max-width:100%;height:auto}

    /* Packages */
    .pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
    .pc{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:14px}
    .pc:hover{border-color:var(--bh)}
    .pn{font-size:13px;font-weight:600;color:var(--w)}
    .pp{font-size:10px;color:var(--m);font-family:monospace}
    .as{margin-top:8px}
    .at{font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
    .at.pub{color:var(--pub)}.at.sub{color:var(--sub)}.at.srv{color:var(--srv)}
    .ai{font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--t);padding:2px 0;display:flex;justify-content:space-between}
    .ai .ty{color:var(--m);font-size:10px}
    .fi{font-size:10px;font-family:monospace;color:var(--m);padding:1px 0}

    /* Tables */
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--b);color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    td{padding:5px 8px;border-bottom:1px solid var(--b);font-family:'SF Mono','Fira Code',monospace}
    tr:hover td{background:var(--card)}
    .tg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500}
    .tg-pub{background:rgba(80,216,204,.12);color:var(--pub)}
    .tg-sub{background:rgba(240,160,80,.12);color:var(--sub)}
    .tg-srv{background:rgba(184,128,240,.12);color:var(--srv)}
    .no{color:var(--m);font-style:italic;font-family:inherit}

    pre{background:var(--sf);border:1px solid var(--b);padding:14px;border-radius:8px;overflow:auto;font-size:12px;line-height:1.6;font-family:'SF Mono','Fira Code',monospace}

    /* Value metrics */
    .val-hero{background:linear-gradient(135deg,#0d1a20,#0d1520);border:1px solid var(--b);border-radius:10px;padding:20px;margin-bottom:16px}
    .val-hero .big{font-size:36px;font-weight:800;color:var(--a);line-height:1}
    .val-hero .label{font-size:12px;color:var(--m);margin-top:4px}
    .bar-chart{display:flex;align-items:flex-end;gap:3px;height:80px;margin-top:10px}
    .bar{background:var(--a);border-radius:3px 3px 0 0;min-width:8px;flex:1;position:relative;transition:height .3s}
    .bar:hover{opacity:.8}
    .bar-label{position:absolute;bottom:-16px;font-size:8px;color:var(--m);width:100%;text-align:center;white-space:nowrap}
    .chart-card{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:12px}

    @media(max-width:900px){nav{display:none}.pg{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>cognibot</h1>
  <div class="meta" id="meta">loading...</div>
  <button class="btn" onclick="load()">refresh</button>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
let SNAP=null,INDEX=null,BRAIN="",KNOWLEDGE="",MERMAID_SRC="",SNAP_ID="";
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

const TABS=[
  {id:"arch",label:"architecture"},
  {id:"value",label:"value metrics"},
  {id:"packages",label:"packages"},
  {id:"wiring",label:"wiring"},
  {id:"knowledge",label:"knowledge"},
  {id:"brain",label:"brain.md"},
  {id:"history",label:"history"},
];

function up(){return(SNAP?.packages||[]).filter(p=>!p.is_vendor)}
function vp(){return(SNAP?.packages||[]).filter(p=>p.is_vendor)}

function buildWiring(){
  const topics={},services={};
  for(const pkg of up()){
    for(const t of(pkg.topics||[])){
      if(!topics[t.topic])topics[t.topic]={msg_type:t.msg_type,pubs:new Set(),subs:new Set()};
      t.direction==="pub"?topics[t.topic].pubs.add(pkg.name):topics[t.topic].subs.add(pkg.name);
    }
    for(const s of(pkg.services||[])){
      if(!services[s.service])services[s.service]={srv_type:s.srv_type,servers:new Set(),clients:new Set()};
      s.role==="server"?services[s.service].servers.add(pkg.name):services[s.service].clients.add(pkg.name);
    }
  }
  return{topics,services};
}

function pkgFiles(pkgPath,list){return(SNAP[list]||[]).filter(f=>f.startsWith(pkgPath+"/"))}

// ── Architecture ──
function tabArch(){
  let h=`<h2>architecture</h2>`;
  if(MERMAID_SRC){
    h+=`<div id="mermaid-box"><pre class="mermaid">${esc(MERMAID_SRC)}</pre></div>`;
    h+=`<div style="margin-top:10px;display:flex;gap:12px;align-items:center">
      <span style="font-size:11px;color:var(--m)">Auto-generated from scan data. The agent can refine this — run <code>cognibot arch generate</code> or ask the agent to improve the architecture.</span>
    </div>`;
  }else{
    h+=`<div style="padding:40px;color:var(--m);text-align:center">
      No architecture diagram yet. Run <code>cognibot scan</code> to auto-generate one.
    </div>`;
  }

  // Vendor summary
  const groups={};
  for(const p of vp()){
    const parts=p.path.split("/");
    const g=parts.length>2?parts[1]:parts[0];
    if(!groups[g])groups[g]=[];
    groups[g].push(p.name);
  }
  h+=`<div style="margin-top:16px;padding:12px 14px;background:var(--card);border:1px solid var(--b);border-radius:8px">
    <div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Vendor dependencies (${vp().length})</div>
    <div style="font-size:11px;color:var(--m)">
      ${Object.entries(groups).sort().map(([g,n])=>`<strong>${esc(g)}</strong> (${n.length})`).join(" · ")}
    </div>
  </div>`;

  return h;
}

// ── Value Metrics ──
function tabValue(){
  const hist=INDEX?.history||[];
  const latest=hist.length?hist[hist.length-1]:{};

  const brainTokens=latest.brain_tokens_proxy||0;
  const repoTokens=latest.repo_tokens_est||0;
  const compression=latest.compression_ratio||0;
  const knowledgeCount=latest.knowledge_entries||0;
  const topicsFound=latest.topics_discovered||0;
  const servicesFound=latest.services_discovered||0;
  const userPkgs=latest.user_packages||0;
  const vendorPkgs=latest.vendor_packages||0;
  const scanCount=hist.length;

  // Estimate cost savings: assume ~$0.003 per 1K input tokens (Claude Sonnet pricing)
  const tokensSaved=Math.max(0,repoTokens-brainTokens);
  const costPerScan=tokensSaved*0.003/1000;
  const totalSaved=costPerScan*scanCount;

  let h=`<h2>cognibot value</h2>`;

  // Hero: compression ratio
  h+=`<div class="val-hero">
    <div style="display:flex;gap:30px;align-items:flex-end;flex-wrap:wrap">
      <div>
        <div class="big">${compression}x</div>
        <div class="label">context compression ratio</div>
      </div>
      <div>
        <div class="big" style="font-size:28px;color:var(--a2)">${brainTokens.toLocaleString()}</div>
        <div class="label">brain tokens vs ${repoTokens.toLocaleString()} source tokens</div>
      </div>
      <div>
        <div class="big" style="font-size:28px;color:var(--green)">${knowledgeCount}</div>
        <div class="label">knowledge entries accumulated</div>
      </div>
    </div>
  </div>`;

  // Stats grid
  h+=`<div class="sg">
    <div class="sc"><div class="l">scans</div><div class="v">${scanCount}</div></div>
    <div class="sc"><div class="l">your packages</div><div class="v">${userPkgs}</div><div class="u">${vendorPkgs} vendor hidden</div></div>
    <div class="sc"><div class="l">topics wired</div><div class="v">${topicsFound}</div></div>
    <div class="sc"><div class="l">services wired</div><div class="v">${servicesFound}</div></div>
    <div class="sc"><div class="l">tokens saved/scan</div><div class="v">${tokensSaved.toLocaleString()}</div><div class="u">~$${costPerScan.toFixed(4)}/scan</div></div>
    <div class="sc"><div class="l">est. total saved</div><div class="v">~$${totalSaved.toFixed(2)}</div><div class="u">over ${scanCount} scans</div></div>
  </div>`;

  // Brain size over time chart
  if(hist.length>1){
    h+=`<div class="chart-card">
      <div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px">Brain tokens over time</div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:60px;padding-bottom:18px">`;
    const maxT=Math.max(...hist.map(e=>e.brain_tokens_proxy||0));
    for(const e of hist.slice(-30)){
      const pct=maxT>0?((e.brain_tokens_proxy||0)/maxT*100):0;
      h+=`<div style="flex:1;min-width:6px;background:var(--a);border-radius:2px 2px 0 0;height:${Math.max(2,pct)}%;position:relative" title="${e.brain_tokens_proxy} tokens — ${(e.created_at||'').substring(0,10)}"></div>`;
    }
    h+=`</div></div>`;
  }

  // Knowledge growth
  if(hist.length>1){
    h+=`<div class="chart-card">
      <div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px">Knowledge entries over time</div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:60px;padding-bottom:18px">`;
    const maxK=Math.max(...hist.map(e=>e.knowledge_entries||0),1);
    for(const e of hist.slice(-30)){
      const pct=maxK>0?((e.knowledge_entries||0)/maxK*100):0;
      h+=`<div style="flex:1;min-width:6px;background:var(--a2);border-radius:2px 2px 0 0;height:${Math.max(2,pct)}%;position:relative" title="${e.knowledge_entries||0} entries — ${(e.created_at||'').substring(0,10)}"></div>`;
    }
    h+=`</div></div>`;
  }

  // What the agent gets
  h+=`<div style="background:var(--card);border:1px solid var(--b);border-radius:8px;padding:14px;margin-top:8px">
    <div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px">What the agent reads instead of your whole repo</div>
    <div style="font-size:12px;color:var(--t);line-height:1.6">
      <strong>brain.md</strong> (${brainTokens} tokens) — packages, topic/service wiring, launch files, params, diffs<br/>
      <strong>knowledge.md</strong> (${knowledgeCount} entries) — conventions, architecture notes, gotchas, debug history<br/>
      <strong>architecture.mmd</strong> — layered Mermaid diagram with inter-node connections<br/>
      <div style="margin-top:6px;color:var(--m)">Without cognibot, the agent would read ~${repoTokens.toLocaleString()} tokens of raw source to get the same understanding.</div>
    </div>
  </div>`;

  return h;
}

// ── Packages ──
function tabPackages(){
  const pkgs=up();
  let h=`<h2>your packages (${pkgs.length})</h2><div class="pg">`;
  for(const p of pkgs){
    const pubs=(p.topics||[]).filter(t=>t.direction==="pub");
    const subs=(p.topics||[]).filter(t=>t.direction==="sub");
    const srvs=p.services||[];
    const launches=pkgFiles(p.path,"launch_files");
    const params=pkgFiles(p.path,"param_files");

    h+=`<div class="pc"><div class="pn">${esc(p.name)}</div><div class="pp">${esc(p.path)} · ${esc(p.build_type||"")}</div>`;
    if(pubs.length){h+=`<div class="as"><div class="at pub">publishes (${pubs.length})</div>`;for(const t of pubs)h+=`<div class="ai"><span>${esc(t.topic)}</span><span class="ty">${esc(t.msg_type)}</span></div>`;h+=`</div>`}
    if(subs.length){h+=`<div class="as"><div class="at sub">subscribes (${subs.length})</div>`;for(const t of subs)h+=`<div class="ai"><span>${esc(t.topic)}</span><span class="ty">${esc(t.msg_type)}</span></div>`;h+=`</div>`}
    if(srvs.length){h+=`<div class="as"><div class="at srv">services (${srvs.length})</div>`;for(const s of srvs)h+=`<div class="ai"><span>${esc(s.service)}</span><span class="ty">${esc(s.srv_type)} · ${esc(s.role)}</span></div>`;h+=`</div>`}
    if(launches.length){h+=`<div class="as"><div class="at" style="color:var(--m)">launch (${launches.length})</div>`;for(const f of launches)h+=`<div class="fi">${esc(f.split("/").pop())}</div>`;h+=`</div>`}
    if(params.length){h+=`<div class="as"><div class="at" style="color:var(--m)">config (${params.length})</div>`;for(const f of params)h+=`<div class="fi">${esc(f.split("/").pop())}</div>`;h+=`</div>`}
    h+=`</div>`;
  }
  return h+`</div>`;
}

// ── Wiring ──
function tabWiring(){
  const{topics,services}=buildWiring();
  let h=`<h2>topic wiring</h2><table><thead><tr><th>topic</th><th>type</th><th>publishers</th><th>subscribers</th></tr></thead><tbody>`;
  for(const[t,i]of Object.entries(topics).sort()){
    const ps=[...i.pubs].sort(),ss=[...i.subs].sort();
    h+=`<tr><td>${esc(t)}</td><td style="color:var(--m)">${esc(i.msg_type)}</td>
      <td>${ps.length?ps.map(p=>`<span class="tg tg-pub">${esc(p)}</span>`).join(" "):'<span class="no">—</span>'}</td>
      <td>${ss.length?ss.map(p=>`<span class="tg tg-sub">${esc(p)}</span>`).join(" "):'<span class="no">—</span>'}</td></tr>`;
  }
  h+=`</tbody></table>`;
  if(Object.keys(services).length){
    h+=`<h2 style="margin-top:20px">service wiring</h2><table><thead><tr><th>service</th><th>type</th><th>server</th><th>clients</th></tr></thead><tbody>`;
    for(const[s,i]of Object.entries(services).sort()){
      const sv=[...i.servers].sort(),cl=[...i.clients].sort();
      h+=`<tr><td>${esc(s)}</td><td style="color:var(--m)">${esc(i.srv_type)}</td>
        <td>${sv.length?sv.map(p=>`<span class="tg tg-srv">${esc(p)}</span>`).join(" "):'<span class="no">—</span>'}</td>
        <td>${cl.length?cl.map(p=>`<span class="tg tg-srv" style="opacity:.6">${esc(p)}</span>`).join(" "):'<span class="no">—</span>'}</td></tr>`;
    }
    h+=`</tbody></table>`;
  }
  return h;
}

// ── Knowledge, Brain, History ──
function tabKnowledge(){return`<h2>knowledge.md</h2><div style="font-size:11px;color:var(--m);margin-bottom:10px">Persistent learnings from AI sessions. This file grows over time as the agent discovers things about your codebase.</div><pre>${esc(KNOWLEDGE)}</pre>`}
function tabBrain(){return`<h2>brain.md</h2><pre>${esc(BRAIN)}</pre>`}
function tabHistory(){
  const hist=(INDEX?.history||[]).slice().reverse();
  let h=`<h2>scan history</h2><table><thead><tr><th>snapshot</th><th>time</th><th>pkgs</th><th>topics</th><th>services</th><th>knowledge</th><th>compression</th></tr></thead><tbody>`;
  for(const e of hist)h+=`<tr><td>${esc(e.snapshot_id||"")}</td><td style="color:var(--m)">${esc((e.created_at||"").replace("T"," ").substring(0,19))}</td><td>${e.user_packages||e.packages||""}</td><td>${e.topics_discovered||"—"}</td><td>${e.services_discovered||"—"}</td><td>${e.knowledge_entries||0}</td><td>${e.compression_ratio||"—"}x</td></tr>`;
  return h+`</tbody></table>`;
}

// ── Nav + routing ──
function buildNav(){
  $("nav").innerHTML=TABS.map(t=>`<a class="ni" data-tab="${t.id}">${t.label}</a>`).join("");
  $("nav").addEventListener("click",e=>{const a=e.target.closest(".ni");if(a){e.preventDefault();setTab(a.dataset.tab)}});
}

function setTab(tab){
  document.querySelectorAll(".ni").forEach(a=>a.classList.toggle("on",a.dataset.tab===tab));
  window.location.hash=tab;
  const r={arch:tabArch,value:tabValue,packages:tabPackages,wiring:tabWiring,knowledge:tabKnowledge,brain:tabBrain,history:tabHistory};
  $("main").innerHTML=(r[tab]||tabArch)();
  if(tab==="arch"&&MERMAID_SRC){
    requestAnimationFrame(()=>mermaid.run({querySelector:'.mermaid'}));
  }
}

async function ft(p){const r=await fetch(p,{cache:"no-store"});return r.ok?await r.text():""}
async function fj(p){const r=await fetch(p,{cache:"no-store"});if(!r.ok)throw new Error(r.status);return await r.json()}

async function load(){
  try{
    INDEX=await fj("../index.json");
    SNAP_ID=INDEX.latest_snapshot_id;
    SNAP=await fj("../snapshots/"+SNAP_ID+"/snapshot.json");
    BRAIN=await ft("../snapshots/"+SNAP_ID+"/brain.md");
    KNOWLEDGE=await ft("../knowledge.md");
    MERMAID_SRC=await ft("../architecture/architecture.mmd");

    const u=up().length,v=vp().length;
    const latest=(INDEX.history||[]).slice(-1)[0]||{};
    $("meta").innerText=`${(SNAP.git_commit||"?").substring(0,10)}${SNAP.git_dirty?" (dirty)":""} · ${u} pkgs · ${latest.topics_discovered||0} topics · ${latest.compression_ratio||"?"}x compression · ${latest.knowledge_entries||0} knowledge entries`;

    setTab((window.location.hash||"#arch").replace("#",""));
  }catch(e){
    $("main").innerHTML=`<div style="padding:40px;color:var(--red)">Failed: ${esc(e.message)}<br>Run <code>cognibot scan</code> first.</div>`;
  }
}

mermaid.initialize({startOnLoad:false,theme:'dark',themeVariables:{
  primaryColor:'#1a2a3a',primaryTextColor:'#cddaea',primaryBorderColor:'#50d8cc',
  lineColor:'#50d8cc',secondaryColor:'#1a2030',tertiaryColor:'#161c26',
  fontSize:'13px',
}});

window.addEventListener("hashchange",()=>setTab((window.location.hash||"#arch").replace("#","")));
buildNav();
load();
</script>
</body>
</html>
